name: Deploy to GitHub Pages
on:
  push:
    branches: [main] # Runs every time you push to the 'main' branch
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Pack for Deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/public  # Just 'dist', no 'public' unless your index.html is in dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
